name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  IMAGE_BACKEND: ghcr.io/troshkins/sna-backend
  IMAGE_FRONTEND: ghcr.io/troshkins/sna-frontend

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ github.sha }}
          build-args: |
            REACT_APP_API_URL=http://sna.local
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Minikube
    needs: build-and-push
    # Запускается на self-hosted runner — машине, где работает Minikube.
    # Настройка: https://docs.github.com/en/actions/hosting-your-own-runners
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/mongodb/
          kubectl apply -f k8s/backend/
          kubectl apply -f k8s/frontend/
          kubectl apply -f k8s/ingress.yaml

      - name: Restart deployments to pull latest images
        run: |
          kubectl rollout restart deployment/backend -n sna
          kubectl rollout restart deployment/frontend -n sna

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/backend -n sna --timeout=120s
          kubectl rollout status deployment/frontend -n sna --timeout=120s
